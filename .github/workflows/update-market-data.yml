name: .github/workflows/update-market-data.yml

on:
  workflow_dispatch:
    inputs:
      session:
        description: Market session
        required: true
        default: all
        type: choice
        options:
          - all
          - asia
          - us
      skip_intraday:
        description: Update daily K only
        required: true
        default: false
        type: boolean
      symbols_json:
        description: Paste the list copied from the review website (1-3 stocks)
        required: false
        type: string
  schedule:
    - cron: "30 12 * * 1-5"
    - cron: "0 4 * * 2-6"

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Choose scheduled session
        id: market
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "session=${{ inputs.session }}" >> "$GITHUB_OUTPUT"
            echo "skip_intraday=${{ inputs.skip_intraday }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 12 * * 1-5" ]; then
            echo "session=asia" >> "$GITHUB_OUTPUT"
            echo "skip_intraday=false" >> "$GITHUB_OUTPUT"
          else
            echo "session=us" >> "$GITHUB_OUTPUT"
            echo "skip_intraday=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download market data
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
          MARKET_SYMBOLS_JSON: ${{ inputs.symbols_json }}
        shell: bash
        run: |
          EXTRA=""
          if [ "${{ steps.market.outputs.skip_intraday }}" = "true" ]; then
            EXTRA="--skip-intraday"
          fi
          python3 update_market_data.py \
            --session "${{ steps.market.outputs.session }}" \
            $EXTRA

      - name: Commit updated data
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- data/)" ]; then
            echo "No market data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Update market data"
          git push
