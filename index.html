<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#176b87">
  <meta name="description" content="用交易事实、基本面事件和资金关注度复盘股票交易。">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>交易复盘 MVP</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #d8dde6;
      --text: #17202a;
      --muted: #647184;
      --red: #d94c4c;
      --blue: #2f72d6;
      --green: #178a5b;
      --ink: #293241;
      --accent: #176b87;
      --warn: #a7650f;
      --shadow: 0 12px 28px rgba(22, 34, 51, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input, textarea, select {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button, .file-button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      min-height: 36px;
      padding: 7px 11px;
      border-radius: 7px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .button.primary, .file-button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .file-button input { display: none; }

    main {
      padding: 16px;
      display: grid;
      grid-template-columns: 280px minmax(420px, 1fr) 360px;
      gap: 14px;
      align-items: start;
    }

    section, aside {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .side, .review {
      min-height: calc(100vh - 96px);
      overflow: hidden;
    }

    .section-head {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .section-title {
      font-weight: 700;
      font-size: 15px;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
    }

    .stock-list {
      padding: 8px;
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 155px);
      overflow: auto;
    }

    .stock-row {
      width: 100%;
      border: 1px solid transparent;
      background: #fff;
      text-align: left;
      border-radius: 7px;
      padding: 10px;
      cursor: pointer;
      display: grid;
      gap: 5px;
    }

    .stock-row.active {
      border-color: var(--accent);
      background: #eef7fa;
    }

    .stock-row strong {
      font-size: 14px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px 10px;
      min-width: 0;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 3px;
    }

    .metric b {
      font-size: 16px;
      overflow-wrap: anywhere;
    }

    .chart-wrap {
      padding: 12px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--ink);
    }

    canvas {
      width: 100%;
      display: block;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
    }

    #dailyChart {
      height: 430px;
    }

    #minuteChart {
      height: 170px;
      margin-top: 10px;
    }

    .panel-note {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
      line-height: 1.5;
    }

    .review-form {
      padding: 12px;
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 140px);
      overflow: auto;
    }

    label.field {
      display: grid;
      gap: 5px;
      font-size: 13px;
      color: var(--ink);
    }

    textarea, input[type="text"], input[type="number"] {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px 10px;
      min-width: 0;
      background: #fff;
      resize: vertical;
    }

    textarea {
      min-height: 72px;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .themes {
      grid-column: 1 / -1;
      box-shadow: none;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
    }

    .theme-card {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 11px;
      display: grid;
      gap: 7px;
      background: #fff;
    }

    .theme-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .tag {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      background: #edf2f5;
      color: var(--ink);
      white-space: nowrap;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      background: #edf0f3;
      overflow: hidden;
    }

    .bar i {
      display: block;
      height: 100%;
      background: var(--accent);
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    @media (max-width: 1160px) {
      main {
        grid-template-columns: 240px minmax(0, 1fr);
      }
      .review {
        grid-column: 1 / -1;
        min-height: auto;
      }
      .review-form {
        max-height: none;
      }
      .theme-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      header {
        height: auto;
        align-items: flex-start;
        padding: 12px;
        gap: 10px;
        flex-direction: column;
      }
      main {
        padding: 10px;
        grid-template-columns: 1fr;
      }
      .side {
        min-height: auto;
      }
      .stock-list {
        max-height: 270px;
      }
      .metrics, .theme-grid {
        grid-template-columns: 1fr;
      }
      .split {
        grid-template-columns: 1fr;
      }
      #dailyChart {
        height: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>交易复盘 MVP</h1>
        <div class="small">交易事实、基本面事件、资金关注度，不做情绪放大。</div>
      </div>
      <div class="header-actions">
        <label class="file-button primary" title="导入券商导出的 Excel 或 CSV 交易单">
          导入交易单
          <input id="tradeFile" type="file">
        </label>
        <label class="file-button" title="可选：导入日线 Excel 或 CSV，字段含 date/open/high/low/close/volume/code">
          导入日线
          <input id="marketFile" type="file">
        </label>
        <button class="button" id="loadSample" type="button">载入示例</button>
        <button class="button" id="exportReview" type="button">导出复盘</button>
      </div>
    </header>

    <main>
      <aside class="side">
        <div class="section-head">
          <div>
            <div class="section-title">交易过的股票</div>
            <div class="small" id="portfolioMeta">未导入</div>
          </div>
        </div>
        <div class="stock-list" id="stockList"></div>
      </aside>

      <section class="chart-panel">
        <div class="metrics" id="metrics"></div>
        <div class="chart-wrap">
          <div class="toolbar">
            <div>
              <div class="section-title" id="chartTitle">请选择股票</div>
              <div class="small" id="chartSub">K 线只保留均线、价格、成交量和买卖点。</div>
            </div>
            <label class="toggle">
              <input id="showMarks" type="checkbox" checked>
              显示买卖点
            </label>
          </div>
          <canvas id="dailyChart" width="900" height="430"></canvas>
          <canvas id="minuteChart" width="900" height="170"></canvas>
          <div class="panel-note" id="chartNote">双击单根 K 线可查看当日分时线。没有导入行情时，系统会用交易价附近生成一段演示日线，方便先做流程验证。</div>
        </div>
      </section>

      <aside class="review">
        <div class="section-head">
          <div>
            <div class="section-title">复盘记录</div>
            <div class="small" id="reviewMeta">按股票本地保存</div>
          </div>
          <button class="button primary" id="saveReview" type="button">保存</button>
        </div>
        <form class="review-form" id="reviewForm">
          <div class="split">
            <label class="field">买前预判
              <textarea name="beforeView" placeholder="买入前看好的基本面、政策或资金理由"></textarea>
            </label>
            <label class="field">预案
              <textarea name="plan" placeholder="上涨、横盘、下跌分别怎么处理"></textarea>
            </label>
          </div>
          <div class="split">
            <label class="field">心里合适买点
              <input name="idealBuy" type="text" placeholder="价格/条件">
            </label>
            <label class="field">心里合适卖点
              <input name="idealSell" type="text" placeholder="价格/条件">
            </label>
          </div>
          <label class="field">持有期重大利好/利空
            <textarea name="events" placeholder="政策、财报、供需、利率、地缘、公司公告"></textarea>
          </label>
          <label class="field">资金/筹码变化
            <textarea name="flow" placeholder="成交量、放量/缩量、换手、资金关注度变化"></textarea>
          </label>
          <div class="split">
            <label class="field">突发事件当天判断
              <textarea name="sameDayView" placeholder="当天对第二天的判断"></textarea>
            </label>
            <label class="field">盘面验证
              <textarea name="actual" placeholder="第二天或之后盘面实际表现"></textarea>
            </label>
          </div>
          <label class="field">这笔交易一句话结论
            <textarea name="conclusion" placeholder="只写事实和可改进动作"></textarea>
          </label>
        </form>
      </aside>

      <section class="themes">
        <div class="section-head">
          <div>
            <div class="section-title">市场主线</div>
            <div class="small">MVP 先手动维护，后续接全球指数、板块涨幅、新闻和成交额。</div>
          </div>
          <button class="button" id="addTheme" type="button">新增主线</button>
        </div>
        <div class="theme-grid" id="themeGrid"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    const state = {
      trades: [],
      market: {},
      selected: null,
      reviews: JSON.parse(localStorage.getItem("tradeReview.notes") || "{}"),
      themes: JSON.parse(localStorage.getItem("tradeReview.themes") || "null") || [
        { name: "AI 算力", region: "美/日/韩", sustain: 78, burst: 86, factor: "盈利预期和资本开支", rhythm: "强趋势后高低切" },
        { name: "减息交易", region: "美股/港股", sustain: 62, burst: 58, factor: "利率下行预期", rhythm: "数据公布前后轮动" },
        { name: "半导体设备", region: "A/日/韩", sustain: 70, burst: 74, factor: "国产替代和扩产周期", rhythm: "政策催化后分化" },
        { name: "能源供需", region: "全球", sustain: 55, burst: 66, factor: "减产、地缘、库存", rhythm: "事件驱动快进快出" }
      ]
    };

    const els = {
      tradeFile: document.getElementById("tradeFile"),
      marketFile: document.getElementById("marketFile"),
      loadSample: document.getElementById("loadSample"),
      exportReview: document.getElementById("exportReview"),
      stockList: document.getElementById("stockList"),
      portfolioMeta: document.getElementById("portfolioMeta"),
      metrics: document.getElementById("metrics"),
      chartTitle: document.getElementById("chartTitle"),
      chartSub: document.getElementById("chartSub"),
      dailyChart: document.getElementById("dailyChart"),
      minuteChart: document.getElementById("minuteChart"),
      showMarks: document.getElementById("showMarks"),
      reviewForm: document.getElementById("reviewForm"),
      saveReview: document.getElementById("saveReview"),
      reviewMeta: document.getElementById("reviewMeta"),
      themeGrid: document.getElementById("themeGrid"),
      addTheme: document.getElementById("addTheme")
    };

    const aliases = {
      date: ["date", "trade_date", "成交日期", "交易日期", "交收日期", "发生日期", "业务日期", "日期", "时间"],
      code: ["code", "symbol", "证券代码", "股票代码", "代码", "ticker"],
      name: ["name", "证券名称", "股票名称", "名称"],
      side: ["side", "direction", "买卖方向", "买卖标志", "业务名称", "操作", "方向", "买卖"],
      price: ["price", "成交价格", "成交价", "成交均价", "价格", "均价"],
      qty: ["qty", "quantity", "成交数量", "证券数量", "数量", "股数"],
      amount: ["amount", "成交金额", "发生金额", "清算金额", "金额"],
      open: ["open", "开盘", "开盘价"],
      high: ["high", "最高", "最高价"],
      low: ["low", "最低", "最低价"],
      close: ["close", "收盘", "收盘价"],
      volume: ["volume", "vol", "成交量"]
    };

    function parseCsv(text) {
      const rows = [];
      let row = [], cell = "", quote = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i], next = text[i + 1];
        if (ch === '"' && quote && next === '"') { cell += '"'; i++; }
        else if (ch === '"') quote = !quote;
        else if (ch === "," && !quote) { row.push(cell.trim()); cell = ""; }
        else if ((ch === "\n" || ch === "\r") && !quote) {
          if (ch === "\r" && next === "\n") i++;
          row.push(cell.trim());
          if (row.some(Boolean)) rows.push(row);
          row = []; cell = "";
        } else cell += ch;
      }
      row.push(cell.trim());
      if (row.some(Boolean)) rows.push(row);
      return rows;
    }

    function pick(headers, key) {
      const lower = headers.map(h => String(h || "").trim().toLowerCase());
      for (const name of aliases[key]) {
        const idx = lower.indexOf(name.toLowerCase());
        if (idx >= 0) return idx;
      }
      return -1;
    }

    function num(value) {
      const cleaned = String(value || "").replace(/[,\s￥$HKDUSD]/g, "");
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : 0;
    }

    function normalizeSide(value) {
      const v = String(value || "").toLowerCase();
      if (v.includes("sell") || v.includes("卖") || v.includes("s")) return "sell";
      return "buy";
    }

    function toDate(value) {
      const raw = String(value || "").trim();
      if (/^\d{8}$/.test(raw)) return `${raw.slice(0,4)}-${raw.slice(4,6)}-${raw.slice(6,8)}`;
      const normalized = raw
        .replace(/[年月./]/g, "-")
        .replace(/日/g, "")
        .replace(/-+/g, "-");
      const d = new Date(normalized);
      if (Number.isNaN(d.getTime())) return raw.slice(0, 10);
      return d.toISOString().slice(0, 10);
    }

    function findHeaderRow(rows, fields) {
      let best = { index: -1, score: 0 };
      rows.slice(0, 40).forEach((row, index) => {
        const score = fields.reduce((total, key) => total + (pick(row, key) >= 0 ? 1 : 0), 0);
        if (score > best.score) best = { index, score };
      });
      return best.score >= 3 ? best.index : -1;
    }

    function rowsToTrades(rows) {
      const headerIndex = findHeaderRow(rows, ["date", "code", "name", "side", "price", "qty", "amount"]);
      if (headerIndex < 0) return [];
      const headers = rows[headerIndex];
      const idx = Object.fromEntries(["date", "code", "name", "side", "price", "qty", "amount"].map(k => [k, pick(headers, k)]));
      return rows.slice(headerIndex + 1).map(r => ({
        date: toDate(r[idx.date]),
        code: String(r[idx.code] || "").trim(),
        name: String(r[idx.name] || r[idx.code] || "").trim(),
        side: normalizeSide(r[idx.side]),
        price: num(r[idx.price]),
        qty: Math.abs(num(r[idx.qty])),
        amount: idx.amount >= 0 ? Math.abs(num(r[idx.amount])) : Math.abs(num(r[idx.price]) * num(r[idx.qty]))
      })).filter(t => t.date && t.code && t.price > 0);
    }

    function readTrades(text) {
      return rowsToTrades(parseCsv(text));
    }

    function rowsToMarket(rows) {
      const headerIndex = findHeaderRow(rows, ["date", "code", "open", "high", "low", "close", "volume"]);
      if (headerIndex < 0) return {};
      const headers = rows[headerIndex];
      const idx = Object.fromEntries(["date", "code", "open", "high", "low", "close", "volume"].map(k => [k, pick(headers, k)]));
      const grouped = {};
      rows.slice(headerIndex + 1).forEach(r => {
        const code = String(r[idx.code] || "").trim();
        if (!code) return;
        grouped[code] ||= [];
        grouped[code].push({
          date: toDate(r[idx.date]),
          open: num(r[idx.open]),
          high: num(r[idx.high]),
          low: num(r[idx.low]),
          close: num(r[idx.close]),
          volume: num(r[idx.volume])
        });
      });
      Object.values(grouped).forEach(list => list.sort((a, b) => a.date.localeCompare(b.date)));
      return grouped;
    }

    function readMarket(text) {
      return rowsToMarket(parseCsv(text));
    }

    function stockGroups() {
      const map = {};
      state.trades.forEach(t => {
        map[t.code] ||= { code: t.code, name: t.name || t.code, trades: [] };
        map[t.code].trades.push(t);
      });
      return Object.values(map).sort((a, b) => b.trades.length - a.trades.length);
    }

    function generateDaily(group) {
      if (state.market[group.code]?.length) return state.market[group.code];
      const trades = [...group.trades].sort((a, b) => a.date.localeCompare(b.date));
      const start = new Date(trades[0].date);
      start.setDate(start.getDate() - 18);
      const end = new Date(trades[trades.length - 1].date);
      end.setDate(end.getDate() + 18);
      let last = trades[0].price * 0.94;
      const days = [];
      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        if (d.getDay() === 0 || d.getDay() === 6) continue;
        const date = d.toISOString().slice(0, 10);
        const trade = trades.find(t => t.date === date);
        const drift = trade ? (trade.price - last) * 0.42 : last * (Math.sin(days.length * 1.7) * 0.012 + 0.004);
        const open = last + drift * 0.35;
        const close = trade ? trade.price + (trade.side === "buy" ? -0.006 : 0.006) * trade.price : last + drift;
        const high = Math.max(open, close) * (1.012 + (days.length % 3) * 0.004);
        const low = Math.min(open, close) * (0.988 - (days.length % 2) * 0.003);
        const volume = 1200000 + Math.abs(close - open) * 1800000 + (trade ? trade.qty * 25 : 0) + (days.length % 5) * 130000;
        days.push({ date, open, high, low, close, volume });
        last = close;
      }
      return days;
    }

    function ma(list, index, size) {
      const from = Math.max(0, index - size + 1);
      const slice = list.slice(from, index + 1);
      return slice.reduce((sum, x) => sum + x.close, 0) / slice.length;
    }

    function selectedGroup() {
      return stockGroups().find(g => g.code === state.selected);
    }

    function money(n) {
      if (!Number.isFinite(n)) return "-";
      if (Math.abs(n) >= 100000000) return `${(n / 100000000).toFixed(2)}亿`;
      if (Math.abs(n) >= 10000) return `${(n / 10000).toFixed(2)}万`;
      return n.toFixed(2);
    }

    function renderStocks() {
      const groups = stockGroups();
      els.portfolioMeta.textContent = groups.length ? `${groups.length} 只股票，${state.trades.length} 笔交易` : "未导入";
      if (!groups.length) {
        els.stockList.innerHTML = `<div class="empty">导入 Excel 或 CSV 交易单后，这里会出现你交易过的股票。支持常见表头：日期、代码、名称、方向、数量、价格。</div>`;
        return;
      }
      if (!state.selected) state.selected = groups[0].code;
      els.stockList.innerHTML = groups.map(g => {
        const buy = g.trades.filter(t => t.side === "buy").reduce((s, t) => s + t.amount, 0);
        const sell = g.trades.filter(t => t.side === "sell").reduce((s, t) => s + t.amount, 0);
        return `<button class="stock-row ${g.code === state.selected ? "active" : ""}" data-code="${g.code}" type="button">
          <strong>${g.name}</strong>
          <span class="small">${g.code} · ${g.trades.length} 笔 · 买 ${money(buy)} / 卖 ${money(sell)}</span>
        </button>`;
      }).join("");
      els.stockList.querySelectorAll(".stock-row").forEach(btn => {
        btn.addEventListener("click", () => {
          saveCurrentReview();
          state.selected = btn.dataset.code;
          render();
        });
      });
    }

    function renderMetrics(group, daily) {
      if (!group) {
        els.metrics.innerHTML = `<div class="empty">暂无数据</div>`;
        return;
      }
      const buyAmount = group.trades.filter(t => t.side === "buy").reduce((s, t) => s + t.amount, 0);
      const sellAmount = group.trades.filter(t => t.side === "sell").reduce((s, t) => s + t.amount, 0);
      const avgVol = daily.reduce((s, d) => s + d.volume, 0) / Math.max(1, daily.length);
      const holdStart = group.trades[0].date;
      const holdEnd = group.trades[group.trades.length - 1].date;
      els.metrics.innerHTML = [
        ["买入额", money(buyAmount)],
        ["卖出额", money(sellAmount)],
        ["均量", money(avgVol)],
        ["交易区间", `${holdStart} 至 ${holdEnd}`]
      ].map(([k, v]) => `<div class="metric"><span>${k}</span><b>${v}</b></div>`).join("");
    }

    function setupCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.max(320, Math.floor(rect.width * scale));
      canvas.height = Math.max(160, Math.floor(rect.height * scale));
      const ctx = canvas.getContext("2d");
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      return { ctx, w: rect.width, h: rect.height };
    }

    function drawDaily(group, daily) {
      const { ctx, w, h } = setupCanvas(els.dailyChart);
      ctx.clearRect(0, 0, w, h);
      if (!group || !daily.length) return;
      const pad = { l: 54, r: 20, t: 18, b: 92 };
      const chartH = h - pad.t - pad.b;
      const volTop = h - 74;
      const volH = 48;
      const min = Math.min(...daily.map(d => d.low));
      const max = Math.max(...daily.map(d => d.high));
      const maxVol = Math.max(...daily.map(d => d.volume));
      const xStep = (w - pad.l - pad.r) / Math.max(1, daily.length);
      const x = i => pad.l + i * xStep + xStep / 2;
      const y = p => pad.t + (max - p) / Math.max(.001, max - min) * chartH;

      ctx.strokeStyle = "#e7ebf0";
      ctx.lineWidth = 1;
      ctx.fillStyle = "#647184";
      ctx.font = "12px sans-serif";
      for (let i = 0; i < 5; i++) {
        const yy = pad.t + chartH * i / 4;
        ctx.beginPath(); ctx.moveTo(pad.l, yy); ctx.lineTo(w - pad.r, yy); ctx.stroke();
        const price = max - (max - min) * i / 4;
        ctx.fillText(price.toFixed(2), 8, yy + 4);
      }

      daily.forEach((d, i) => {
        const color = d.close >= d.open ? "#d94c4c" : "#178a5b";
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        const cx = x(i);
        ctx.beginPath();
        ctx.moveTo(cx, y(d.high));
        ctx.lineTo(cx, y(d.low));
        ctx.stroke();
        const bodyTop = y(Math.max(d.open, d.close));
        const bodyH = Math.max(2, Math.abs(y(d.open) - y(d.close)));
        ctx.fillRect(cx - Math.max(2, xStep * .28), bodyTop, Math.max(4, xStep * .56), bodyH);
        const vh = d.volume / maxVol * volH;
        ctx.globalAlpha = .38;
        ctx.fillRect(cx - Math.max(2, xStep * .25), volTop + volH - vh, Math.max(3, xStep * .5), vh);
        ctx.globalAlpha = 1;
      });

      drawLine(ctx, daily.map((_, i) => [x(i), y(ma(daily, i, 5))]), "#2f72d6");
      drawLine(ctx, daily.map((_, i) => [x(i), y(ma(daily, i, 20))]), "#a7650f");
      ctx.fillStyle = "#2f72d6"; ctx.fillText("MA5", w - 88, 28);
      ctx.fillStyle = "#a7650f"; ctx.fillText("MA20", w - 50, 28);

      if (els.showMarks.checked) {
        group.trades.forEach(t => {
          const i = daily.findIndex(d => d.date === t.date);
          if (i < 0) return;
          const cx = x(i);
          const cy = y(t.price);
          ctx.fillStyle = t.side === "buy" ? "#d94c4c" : "#2f72d6";
          ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = "#fff";
          ctx.font = "10px sans-serif";
          ctx.fillText(t.side === "buy" ? "B" : "S", cx - 3, cy + 4);
        });
      }

      ctx.fillStyle = "#647184";
      ctx.font = "12px sans-serif";
      const dateEvery = Math.ceil(daily.length / 6);
      daily.forEach((d, i) => {
        if (i % dateEvery === 0 || i === daily.length - 1) ctx.fillText(d.date.slice(5), x(i) - 15, h - 14);
      });
      els.dailyChart.dataset.points = JSON.stringify(daily.map((d, i) => ({ date: d.date, x: x(i) })));
    }

    function drawLine(ctx, points, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      points.forEach(([x, y], i) => i ? ctx.lineTo(x, y) : ctx.moveTo(x, y));
      ctx.stroke();
    }

    function drawMinute(date, base) {
      const { ctx, w, h } = setupCanvas(els.minuteChart);
      ctx.clearRect(0, 0, w, h);
      const pad = { l: 48, r: 16, t: 18, b: 28 };
      const points = Array.from({ length: 48 }, (_, i) => {
        const wave = Math.sin(i / 4) * base * .006 + Math.cos(i / 9) * base * .004;
        return base + wave + (i - 24) * base * .00035;
      });
      const min = Math.min(...points), max = Math.max(...points);
      const x = i => pad.l + i / (points.length - 1) * (w - pad.l - pad.r);
      const y = p => pad.t + (max - p) / Math.max(.001, max - min) * (h - pad.t - pad.b);
      ctx.strokeStyle = "#e7ebf0";
      for (let i = 0; i < 3; i++) {
        const yy = pad.t + (h - pad.t - pad.b) * i / 2;
        ctx.beginPath(); ctx.moveTo(pad.l, yy); ctx.lineTo(w - pad.r, yy); ctx.stroke();
      }
      drawLine(ctx, points.map((p, i) => [x(i), y(p)]), "#176b87");
      ctx.fillStyle = "#17202a";
      ctx.font = "13px sans-serif";
      ctx.fillText(`${date} 分时线`, 12, 16);
      ctx.fillStyle = "#647184";
      ctx.fillText("09:30", pad.l, h - 8);
      ctx.fillText("15:00", w - 55, h - 8);
    }

    function loadReview() {
      const data = state.reviews[state.selected] || {};
      [...els.reviewForm.elements].forEach(el => {
        if (el.name) el.value = data[el.name] || "";
      });
      els.reviewMeta.textContent = state.selected ? `${state.selected} 本地保存` : "按股票本地保存";
    }

    function saveCurrentReview() {
      if (!state.selected) return;
      const data = {};
      [...els.reviewForm.elements].forEach(el => {
        if (el.name) data[el.name] = el.value;
      });
      state.reviews[state.selected] = data;
      localStorage.setItem("tradeReview.notes", JSON.stringify(state.reviews));
    }

    function renderThemes() {
      els.themeGrid.innerHTML = state.themes.map((t, i) => `<div class="theme-card">
        <div class="theme-top"><strong contenteditable data-theme="${i}" data-field="name">${t.name}</strong><span class="tag" contenteditable data-theme="${i}" data-field="region">${t.region}</span></div>
        <div class="small">持续性 ${t.sustain}</div><div class="bar"><i style="width:${t.sustain}%"></i></div>
        <div class="small">爆发力 ${t.burst}</div><div class="bar"><i style="width:${t.burst}%; background:#d94c4c"></i></div>
        <div class="small" contenteditable data-theme="${i}" data-field="factor">因素：${t.factor}</div>
        <div class="small" contenteditable data-theme="${i}" data-field="rhythm">节奏：${t.rhythm}</div>
      </div>`).join("");
      els.themeGrid.querySelectorAll("[contenteditable]").forEach(node => {
        node.addEventListener("blur", () => {
          const theme = state.themes[Number(node.dataset.theme)];
          const field = node.dataset.field;
          let value = node.textContent.trim();
          if (field === "factor") value = value.replace(/^因素：?/, "");
          if (field === "rhythm") value = value.replace(/^节奏：?/, "");
          theme[field] = value;
          localStorage.setItem("tradeReview.themes", JSON.stringify(state.themes));
        });
      });
    }

    function render() {
      renderStocks();
      const group = selectedGroup();
      const daily = group ? generateDaily(group) : [];
      renderMetrics(group, daily);
      els.chartTitle.textContent = group ? `${group.name} ${group.code}` : "请选择股票";
      els.chartSub.textContent = group ? `${daily.length} 根日线 · 红点买入 · 蓝点卖出` : "K 线只保留均线、价格、成交量和买卖点。";
      drawDaily(group, daily);
      if (daily.length) drawMinute(daily[Math.floor(daily.length / 2)].date, daily[Math.floor(daily.length / 2)].close);
      loadReview();
      renderThemes();
    }

    async function readSpreadsheet(file) {
      const extension = file.name.split(".").pop().toLowerCase();
      if (extension === "csv" || extension === "txt") return [parseCsv(await file.text())];
      if (!window.XLSX) throw new Error("Excel 读取组件加载失败，请确认网络正常后刷新网页。");
      const workbook = XLSX.read(await file.arrayBuffer(), { type: "array", cellDates: true });
      return workbook.SheetNames.map(name =>
        XLSX.utils.sheet_to_json(workbook.Sheets[name], { header: 1, defval: "", raw: false })
      );
    }

    els.tradeFile.addEventListener("change", async e => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        saveCurrentReview();
        const sheets = await readSpreadsheet(file);
        const candidates = sheets.map(rowsToTrades);
        state.trades = candidates.sort((a, b) => b.length - a.length)[0] || [];
        if (!state.trades.length) {
          alert("没有识别到成交记录。请确认文件中包含日期、证券代码、买卖方向、成交价格等列。");
          return;
        }
        state.selected = null;
        render();
      } catch (error) {
        alert(error.message || "文件读取失败，请换一个文件重试。");
      } finally {
        e.target.value = "";
      }
    });

    els.marketFile.addEventListener("change", async e => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const sheets = await readSpreadsheet(file);
        const market = sheets.map(rowsToMarket).reduce((all, current) => ({ ...all, ...current }), {});
        if (!Object.keys(market).length) {
          alert("没有识别到日线数据，请检查日期、代码、开高低收和成交量列。");
          return;
        }
        state.market = { ...state.market, ...market };
        render();
      } catch (error) {
        alert(error.message || "文件读取失败，请换一个文件重试。");
      } finally {
        e.target.value = "";
      }
    });

    els.showMarks.addEventListener("change", render);
    els.saveReview.addEventListener("click", () => {
      saveCurrentReview();
      els.saveReview.textContent = "已保存";
      setTimeout(() => els.saveReview.textContent = "保存", 900);
    });

    els.exportReview.addEventListener("click", () => {
      saveCurrentReview();
      const payload = {
        exportedAt: new Date().toISOString(),
        trades: state.trades,
        reviews: state.reviews,
        themes: state.themes
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "trade-review.json";
      a.click();
      URL.revokeObjectURL(a.href);
    });

    els.addTheme.addEventListener("click", () => {
      state.themes.unshift({ name: "新主线", region: "市场", sustain: 50, burst: 50, factor: "触发因素", rhythm: "轮动节奏" });
      localStorage.setItem("tradeReview.themes", JSON.stringify(state.themes));
      renderThemes();
    });

    els.dailyChart.addEventListener("dblclick", e => {
      const group = selectedGroup();
      if (!group) return;
      const daily = generateDaily(group);
      const rect = els.dailyChart.getBoundingClientRect();
      const px = e.clientX - rect.left;
      const points = JSON.parse(els.dailyChart.dataset.points || "[]");
      const nearest = points.reduce((best, p, i) => {
        const dist = Math.abs(p.x - px);
        return dist < best.dist ? { dist, i } : best;
      }, { dist: Infinity, i: 0 });
      const day = daily[nearest.i];
      if (day) drawMinute(day.date, day.close);
    });

    window.addEventListener("resize", render);

    els.loadSample.addEventListener("click", () => {
      state.trades = readTrades(`日期,证券代码,证券名称,买卖方向,成交数量,成交价格,成交金额
2026-05-13,NVDA,NVIDIA,买入,80,132.20,10576
2026-05-20,NVDA,NVIDIA,买入,60,138.10,8286
2026-05-29,NVDA,NVIDIA,卖出,140,128.70,18018
2026-05-16,00700.HK,腾讯控股,买入,200,386.40,77280
2026-05-24,00700.HK,腾讯控股,卖出,200,372.80,74560
2026-05-14,688981.SH,中芯国际,买入,1000,86.50,86500
2026-05-27,688981.SH,中芯国际,卖出,1000,79.20,79200`);
      state.selected = null;
      render();
    });

    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }

    render();
  </script>
</body>
</html>
